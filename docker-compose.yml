# Production stack for schoenheitsecke-oldenburg.de
# Project name fixes certbot volume name -> garmonia_certbot-etc (see mailcow/scripts/sync-letsencrypt.sh)
name: garmonia

networks:
  garmonia-network:
    driver: bridge

volumes:
  garmonia-db:
  media:
  staticfiles:
  certbot-etc:
  certbot-www:

services:
  db:
    image: postgres:17-alpine
    volumes:
      - garmonia-db:/var/lib/postgresql/data/
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file:
      - .env
    networks:
      - garmonia-network

  backend:
    depends_on:
      db:
        condition: service_healthy
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - media:/src/media
      - staticfiles:/src/staticfiles
    expose:
      - "8000"
    networks:
      - garmonia-network
    container_name: backend
    env_file: .env
    command: bash ./scripts/run_backend.sh
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://schoenheitsecke-oldenburg.de
    container_name: frontend
    expose:
      - "80"
    networks:
      - garmonia-network
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - staticfiles:/src/staticfiles:ro
      - media:/src/media:ro
      - certbot-etc:/etc/letsencrypt:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - certbot-www:/var/www/certbot:ro
    networks:
      - garmonia-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    # Reload every 6h so renewed Let's Encrypt certs are picked up without manual action
    command: sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"
    healthcheck:
      test: [ "CMD-SHELL", "nginx -t && wget -q -O- --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: [ "sh", "-c", "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;" ]
    networks:
      - garmonia-network
    restart: unless-stopped
