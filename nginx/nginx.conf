user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    charset utf-8;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    log_not_found off;
    types_hash_max_size 2048;
    client_max_body_size 200M;

    # Map for Connection upgrade (WebSocket support, needed by SOGo/Mailcow UI)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # MIME Types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # SSL defaults (per-server blocks may override)
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_ecdh_curve secp384r1;

    ssl_stapling off;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # --- HTTP: main site (ACME + redirect) --- #
    server {
        listen 80;
        listen [::]:80;
        server_name schoenheitsecke-oldenburg.de www.schoenheitsecke-oldenburg.de;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
            try_files $uri =404;
        }

        location / {
            return 301 https://schoenheitsecke-oldenburg.de$request_uri;
        }
    }

    # --- HTTPS: main site --- #
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name www.schoenheitsecke-oldenburg.de;

        ssl_certificate /etc/letsencrypt/live/schoenheitsecke-oldenburg.de/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/schoenheitsecke-oldenburg.de/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/schoenheitsecke-oldenburg.de/chain.pem;

        return 301 https://schoenheitsecke-oldenburg.de$request_uri;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name schoenheitsecke-oldenburg.de;

        ssl_certificate /etc/letsencrypt/live/schoenheitsecke-oldenburg.de/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/schoenheitsecke-oldenburg.de/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/schoenheitsecke-oldenburg.de/chain.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Django admin / collectstatic (volume: staticfiles -> /src/staticfiles)
        location /static/ {
            alias /src/staticfiles/;
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # Gallery uploads (volume: media -> /src/media)
        location /media/ {
            alias /src/media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        location /api/ {
            proxy_pass http://backend:8000;
            include /etc/nginx/proxy_params;

            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
        }

        location /admin/ {
            proxy_pass http://backend:8000;
            include /etc/nginx/proxy_params;
        }

        location / {
            proxy_pass http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            include /etc/nginx/proxy_params;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 24k;
            proxy_max_temp_file_size 2048m;
        }

        location ~* /(\.git|\.env|\.htaccess|\.htpasswd) {
            deny all;
            return 403;
        }
    }

    # --- Optional vHosts (e.g. mail.*) -------------------------------- #
    # Each lives in its own file so a missing cert only affects that vHost.
    # To disable one: remove/rename its file in nginx/conf.d/ and reload.
    include /etc/nginx/conf.d/*.conf;
}
