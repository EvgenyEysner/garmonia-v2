# Mailcow reverse proxy for mail.schoenheitsecke-oldenburg.de
# Optional vHost: if the cert is missing, remove/rename this file and reload
# nginx so the main site stays up. Issue the cert via
# backend/mailcow/scripts/issue-cert.sh, then restore this file.

# --- HTTP: ACME challenge + redirect to HTTPS --- #
server {
    listen 80;
    listen [::]:80;
    server_name mail.schoenheitsecke-oldenburg.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: proxy to host Mailcow nginx on 127.0.0.1:8443 --- #
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mail.schoenheitsecke-oldenburg.de;

    ssl_certificate /etc/letsencrypt/live/mail.schoenheitsecke-oldenburg.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.schoenheitsecke-oldenburg.de/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/mail.schoenheitsecke-oldenburg.de/chain.pem;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;

    client_max_body_size 0;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # Variable proxy_pass: resolves at request time so nginx starts even if Mailcow is down
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $mailcow_backend "host.docker.internal:8443";

    location / {
        proxy_pass https://$mailcow_backend;
        proxy_http_version 1.1;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
