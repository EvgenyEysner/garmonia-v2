name: Deploy to Production

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: garmonia_test
          POSTGRES_USER: garmonia
          POSTGRES_PASSWORD: garmonia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U garmonia"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: config.settings
      SECRET_KEY: ci-test-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_NAME: garmonia_test
      DATABASE_USER: garmonia
      DATABASE_PASSWORD: garmonia
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DJANGO_SESSION_COOKIE_SECURE: "False"
      DJANGO_STATIC_ROOT: /tmp/static
    steps:
      - name: Code Download
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U uv
          uv pip install --system --python "$(which python)" .
      - name: Lint Code (Ruff)
        run: uvx ruff check .
      - name: Run Tests
        run: python manage.py test
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/www/garmonia
            git pull https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/EvgenyEysner/garmonia-v2.git master
            docker compose build
            docker compose up -d
            docker compose exec -T nginx nginx -t
            docker compose exec -T nginx nginx -s reload
